<html>
    <head>
        <style>
    label {
      /* display: block faz o label ocupar a linha inteira,
         empurrando o input para a linha seguinte */
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #16213e;
      margin-top: 16px;
      margin-bottom: 4px;
      font-family: Arial, sans-serif;
    }

    
        

    


    
    

            input[type="text"],
    input[type="email"],
    select,
    textarea {
      /* display: block + width: 100% faz o campo ocupar toda a largura */
      display: block;
      width: 100%;

      /* box-sizing: border-box inclui padding e borda no cálculo da width */
      box-sizing: border-box;

      padding: 10px 12px;
      border: 1px solid #b0c4d8;
      border-radius: 6px;
      font-size: 0.95rem;
      color: #1a1a2e;
      background-color: #f7fafd;
    }

        </style>
    </head>
    <header> </header>
    <form>

        <label for="nome">Nome:</label>
    <input type="text" name="nome" placeholder="Brain Dos Santos">

         <label for="email"> <p class="teste"> Email: </p></label>
         <input type="text" email="email" placeholder="brainsantos@gmail.com">
         <fielset>
           <legend>Categoria</legend>
           <label for="categorias">Selecione o Setor:</label>
           <select id="categoria" name="categorias">
        <option value="Suporte Tecnico">Suporte Tecnico</option>
        <option value="Solitação de Equipamentos" selected>Solicitar Equipamento</option>
        <option value="Acesso ao Sistema">Acesso ao Sistema</option>

        <option value="Duvidas Administrativas">Duvidas Administrativas</option>
    </select>

    <fieldset>
        <!-- Departamento  -->
         <legend>Selecione o Departamento correspondente:</legend>

         <div>
        <input type="radio" id="T.I" name="contact_method" value="T.I" checked>
        <label for="TI">T.I </label>
        </div>

        <div>
        <input type="radio" id="RH" name="contact_method" value="RH">
        <label for="RH">RH</label>
        </div>

        <div>
        <input type="radio" id="Financeiro" name="contact_method" value="Financeiro">
        <label for="Financeiro">Financeiro</label>
        </div>
        
    </fieldset>

    <label for="Descrição"> Descricao</label>
    <textarea id="mensagem" name="mensagem"></textarea>
    
    <button type="Enviar">Enviar</button>
    

</form>
</html>
