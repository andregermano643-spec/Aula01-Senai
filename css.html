<html>

<head>
  <title>Nota do Aluno</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #eeeded;
    }
    .card:hover {
        box-shadow: #e6e3e3;
        background-color: #2c2b2b;

    }
    .card {
      width: 300px;
      padding: 20px;
      margin: 50px auto;
      border-radius: 12px;
      background-color: rgb(5, 0, 0);
      box-shadow: 0 8px 16px #ec0e0e;
      text-align: center;
    }

    .destaque {
      font-size: 24px;
      font-weight: bold;
    }
    #nome-aluno {
        color: antiquewhite;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    }

    #nota {
        color: #ebcd34;

    }
    
   
    #situacao {
      font-size: 18px;
      color: green;
    }

  </style>
</head>

<body>

  <div class="card">
    <p id="nome-aluno" class="destaque"></p>
    <h2 id="nota"></h2>
    <span id="situacao"></span>
  </div>

  <script>
    let nomeAluno = "Germano";
    let nota = 8.0;
    let situacao = "Aprovado";

    const elNome = document.getElementById("nome-aluno");
    const elNota = document.getElementById("nota");
    const elSit = document.getElementById("situacao");

    elNome.textContent = nomeAluno;
    elNota.textContent = `Nota: ${nota}`;
    elSit.innerHTML = `<b>${situacao}</b>`;
  </script>

</body>

</html>
